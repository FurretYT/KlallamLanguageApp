<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Klallam Learning App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: "Courier New", monospace;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    button {
      cursor: pointer;
      font-family: "Courier New", monospace;
    }

    #map {
      display: grid;
      gap: 15px;
      justify-items: center;
      width: 100%;
      max-width: 600px;
      margin-top: 20px;
    }

    .unit {
      background: white;
      padding: 15px;
      border-radius: 8px;
      width: 100%;
    }

    .unit-title {
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
    }

    .lesson {
      padding: 8px;
      margin: 5px 0;
      background: #e0e0e0;
      border-radius: 5px;
      cursor: pointer;
      text-align: center;
      width: 80%;
    }

    .lesson.completed {
      background: #a5d6a7;
    }

    .lesson.locked {
      background: #ccc;
      cursor: not-allowed;
    }

    #lesson {
      display: none;
      max-width: 600px;
      width: 100%;
      text-align: center;
      margin-top: 20px;
    }

    #back-to-map-btn {
      margin-bottom: 15px;
      padding: 8px 15px;
      border-radius: 5px;
      background: #f44336;
      color: white;
      border: none;
    }

    #progress-bar {
      width: 100%;
      height: 10px;
      background: #ddd;
      margin-bottom: 20px;
      border-radius: 5px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: #4caf50;
    }

    #question-text span {
      cursor: pointer;
      margin: 0 2px;
      display: inline-block;
    }

    #choices {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .choice {
      padding: 12px 20px;
      background: #2196f3;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      width: 80%;
      max-width: 300px;
      text-align: center;
      transition: background 0.2s;
    }

    .choice:hover {
      background: #1976d2;
    }

    #popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
    }

    #popup {
      background: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      max-width: 300px;
      font-family: "Courier New", monospace;
    }

    #popup-buttons button {
      margin: 5px;
      padding: 8px 15px;
      font-family: "Courier New", monospace;
    }
  </style>
</head>

<body>

<h1>Klallam Learning App</h1>
<button onclick="promptResetProgress()">Reset Progress</button>

<div id="map"></div>

<div id="lesson">
  <button id="back-to-map-btn" onclick="backToMap()">Back to Map</button>
  <h2 id="lesson-title"></h2>

  <div id="progress-bar">
    <div id="progress-fill"></div>
  </div>

  <div id="question-text"></div>
  <div id="choices"></div>
</div>

<div id="popup-overlay">
  <div id="popup">
    <div id="popup-text"></div>
    <div id="popup-buttons"></div>
  </div>
</div>

<script>
// ====================== App State ======================
let units = [];
let currentUnitIndex = 0;
let currentLessonIndex = 0;
let currentQuestionIndex = 0;

let completedLessons = JSON.parse(localStorage.getItem("completedLessons") || "[]");

// ====================== DOM Elements ======================
const mapDiv = document.getElementById("map");
const lessonDiv = document.getElementById("lesson");
const lessonTitle = document.getElementById("lesson-title");
const questionText = document.getElementById("question-text");
const choicesDiv = document.getElementById("choices");
const progressFill = document.getElementById("progress-fill");
const popupOverlay = document.getElementById("popup-overlay");
const popupText = document.getElementById("popup-text");
const popupButtons = document.getElementById("popup-buttons");

// ====================== Utility ======================
function shuffleArray(array) {
  const copy = [...array];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function isLessonCompleted(unit, lesson) {
  return completedLessons.some(l => l.unit === unit && l.lesson === lesson);
}

function markLessonComplete(unit, lesson) {
  if (!isLessonCompleted(unit, lesson)) {
    completedLessons.push({ unit, lesson });
    localStorage.setItem("completedLessons", JSON.stringify(completedLessons));
  }
}

// ====================== Popup ======================
function showPopup(message, buttons = [{ text: "OK", callback: closePopup }]) {
  popupText.textContent = message;
  popupButtons.innerHTML = "";

  buttons.forEach(btn => {
    const b = document.createElement("button");
    b.textContent = btn.text;
    b.onclick = btn.callback;
    popupButtons.appendChild(b);
  });

  popupOverlay.style.display = "flex";
}

function closePopup() {
  popupOverlay.style.display = "none";
}

// ====================== Load Questions ======================
async function loadQuestions() {
  try {
    const response = await fetch("questions.json");
    const data = await response.json();
    units = data;
    renderMap();
  } catch (err) {
    showPopup("Error loading questions.json — check JSON formatting.");
    console.error(err);
  }
}

window.onload = loadQuestions;

// ====================== Map Rendering ======================
function renderMap() {
  mapDiv.innerHTML = "";

  units.forEach((unit, uIndex) => {
    const unitDiv = document.createElement("div");
    unitDiv.className = "unit";

    const title = document.createElement("div");
    title.className = "unit-title";
    title.textContent = unit.unit;
    unitDiv.appendChild(title);

    unit.lessons.forEach((lesson, lIndex) => {
      const lessonBtn = document.createElement("div");
      lessonBtn.className = "lesson";
      lessonBtn.textContent = lesson.name;

      if (isLessonCompleted(uIndex, lIndex)) {
        lessonBtn.classList.add("completed");
      }

      const locked = !isUnlocked(uIndex, lIndex);

      if (locked) {
        lessonBtn.classList.add("locked");
      } else {
        lessonBtn.onclick = () => startLesson(uIndex, lIndex);
      }

      unitDiv.appendChild(lessonBtn);
    });

    mapDiv.appendChild(unitDiv);
  });
}

function isUnlocked(uIndex, lIndex) {
  if (uIndex === 0 && lIndex === 0) return true;

  let prevUnit = uIndex;
  let prevLesson = lIndex - 1;

  if (prevLesson < 0) {
    prevUnit--;
    if (prevUnit < 0) return false;
    prevLesson = units[prevUnit].lessons.length - 1;
  }

  return isLessonCompleted(prevUnit, prevLesson);
}

// ====================== Lesson ======================
function startLesson(unitIdx, lessonIdx) {
  currentUnitIndex = unitIdx;
  currentLessonIndex = lessonIdx;
  currentQuestionIndex = 0;

  mapDiv.style.display = "none";
  lessonDiv.style.display = "block";

  renderQuestion();
}

function renderQuestion() {
  const lesson = units[currentUnitIndex].lessons[currentLessonIndex];
  const question = lesson.questions[currentQuestionIndex];
  if (!question) return;

  lessonTitle.textContent =
    `${units[currentUnitIndex].unit} - ${lesson.name}`;

  questionText.innerHTML = "";
  choicesDiv.innerHTML = "";

  question.sentence.split(" ").forEach(word => {
    const span = document.createElement("span");
    span.textContent = word;
    span.onclick = () =>
      showPopup(question.definitions[word] || "No definition available.");
    questionText.appendChild(span);
    questionText.appendChild(document.createTextNode(" "));
  });

  shuffleArray(question.answers).forEach(answer => {
    const btn = document.createElement("div");
    btn.className = "choice";
    btn.textContent = answer;
    btn.onclick = () => checkAnswer(answer, question.correct);
    choicesDiv.appendChild(btn);
  });

  updateProgressBar();
}

function updateProgressBar() {
  const lesson = units[currentUnitIndex].lessons[currentLessonIndex];
  const percent =
    (currentQuestionIndex / lesson.questions.length) * 100;
  progressFill.style.width = percent + "%";
}

// ====================== Answer Checking ======================
function checkAnswer(selected, correct) {
  if (selected === correct) {
    currentQuestionIndex++;

    const lesson = units[currentUnitIndex].lessons[currentLessonIndex];

    if (currentQuestionIndex >= lesson.questions.length) {
      progressFill.style.width = "100%";
      markLessonComplete(currentUnitIndex, currentLessonIndex);

      showPopup("Lesson completed!", [
        {
          text: "Back to Map",
          callback: () => {
            closePopup();
            backToMap();
            renderMap();
          }
        }
      ]);
    } else {
      renderQuestion();
    }
  } else {
    showPopup("Incorrect! Restarting lesson.", [
      {
        text: "Try Again",
        callback: () => {
          closePopup();
          currentQuestionIndex = 0;
          renderQuestion();
        }
      }
    ]);
  }
}

// ====================== Reset ======================
function promptResetProgress() {
  showPopup("Are you sure you want to reset ALL progress?", [
    {
      text: "Yes",
      callback: () => {
        localStorage.removeItem("completedLessons");
        completedLessons = [];
        currentUnitIndex = 0;
        currentLessonIndex = 0;
        currentQuestionIndex = 0;
        closePopup();
        backToMap();
        renderMap();
      }
    },
    { text: "Cancel", callback: closePopup }
  ]);
}

function backToMap() {
  lessonDiv.style.display = "none";
  mapDiv.style.display = "grid";
}
</script>

</body>
</html>
