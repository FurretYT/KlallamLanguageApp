<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Klallam Learning App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: "Courier New", monospace;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align: center;
  }

  h1 { margin-top: 0; }

  button {
    cursor: pointer;
    font-family: "Courier New", monospace;
    text-align: center;
  }

  #map {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    width: 100%;
    max-width: 600px;
    margin-top: 20px;
  }

  .unit {
    background: white;
    padding: 15px;
    border-radius: 8px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .unit-title {
    font-weight: bold;
    margin-bottom: 10px;
  }

  .lesson {
    padding: 8px;
    margin: 5px 0;
    background: #e0e0e0;
    border-radius: 5px;
    cursor: pointer;
    width: 80%;
    max-width: 250px;
  }

  .lesson.completed { background: #a5d6a7; }
  .lesson.locked { background: #ccc; cursor: not-allowed; }

  #lesson {
    display: none;
    max-width: 600px;
    width: 100%;
    margin-top: 20px;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  #back-to-map-btn {
    margin-bottom: 15px;
    padding: 8px 15px;
    border-radius: 5px;
    background: #f44336;
    color: white;
    border: none;
  }

  #progress-bar {
    width: 80%;
    height: 10px;
    background: #ddd;
    margin-bottom: 20px;
    border-radius: 5px;
    overflow: hidden;
  }

  #progress-fill {
    height: 100%;
    width: 0%;
    background: #4caf50;
  }

  #question-text {
    margin-bottom: 20px;
    font-size: 18px;
  }

  #question-text span.word {
    cursor: pointer;
    margin: 0 3px;
    display: inline-block;
    border-bottom: 1px dotted #000;
  }

  #choices {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .choice {
    padding: 12px 20px;
    background: #2196f3;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    width: 80%;
    max-width: 300px;
    transition: background 0.2s;
  }

  .choice:hover { background: #1976d2; }

  #popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.5);
    text-align: center;
  }

  #popup {
    background: white;
    padding: 20px;
    border-radius: 8px;
    max-width: 300px;
    width: 80%;
  }

  #popup-buttons {
    margin-top: 15px;
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  .audio-icon {
    cursor: pointer;
    font-size: 20px;
    margin-right: 8px;
    vertical-align: middle;
  }
</style>
</head>

<body>

<h1>Klallam Learning App</h1>
<button onclick="promptResetProgress()">Reset Progress</button>

<div id="map"></div>

<div id="lesson">
  <button id="back-to-map-btn" onclick="backToMap()">Back to Map</button>
  <h2 id="lesson-title"></h2>

  <div id="progress-bar">
    <div id="progress-fill"></div>
  </div>

  <div id="question-text"></div>
  <div id="choices"></div>
</div>

<div id="popup-overlay">
  <div id="popup">
    <div id="popup-text"></div>
    <div id="popup-buttons"></div>
  </div>
</div>

<script>
let units = [];
let currentUnitIndex = 0;
let currentLessonIndex = 0;
let currentQuestionIndex = 0;
let completedLessons = JSON.parse(localStorage.getItem("completedLessons") || "[]");

const mapDiv = document.getElementById("map");
const lessonDiv = document.getElementById("lesson");
const lessonTitle = document.getElementById("lesson-title");
const questionText = document.getElementById("question-text");
const choicesDiv = document.getElementById("choices");
const progressFill = document.getElementById("progress-fill");
const popupOverlay = document.getElementById("popup-overlay");
const popupText = document.getElementById("popup-text");
const popupButtons = document.getElementById("popup-buttons");

function showPopup(message) {
  popupText.textContent = message;
  popupButtons.innerHTML = "<button onclick='closePopup()'>OK</button>";
  popupOverlay.style.display = "flex";
}

function closePopup() {
  popupOverlay.style.display = "none";
}

async function loadQuestions() {
  const response = await fetch("questions.json");
  units = await response.json();
  renderMap();
}

window.onload = loadQuestions;

function renderMap() {
  mapDiv.innerHTML = "";
  units.forEach((unit, uIndex) => {
    const unitDiv = document.createElement("div");
    unitDiv.className = "unit";

    const title = document.createElement("div");
    title.className = "unit-title";
    title.textContent = unit.unit;
    unitDiv.appendChild(title);

    unit.lessons.forEach((lesson, lIndex) => {
      const lessonBtn = document.createElement("div");
      lessonBtn.className = "lesson";
      lessonBtn.textContent = lesson.name;
      lessonBtn.onclick = () => startLesson(uIndex, lIndex);
      unitDiv.appendChild(lessonBtn);
    });

    mapDiv.appendChild(unitDiv);
  });
}

function startLesson(unitIdx, lessonIdx) {
  currentUnitIndex = unitIdx;
  currentLessonIndex = lessonIdx;
  currentQuestionIndex = 0;
  mapDiv.style.display = "none";
  lessonDiv.style.display = "flex";
  renderQuestion();
}

function renderQuestion() {
  const lesson = units[currentUnitIndex].lessons[currentLessonIndex];
  const question = lesson.questions[currentQuestionIndex];

  lessonTitle.textContent = lesson.name;
  questionText.innerHTML = "";
  choicesDiv.innerHTML = "";

  if (question.audio) {
    const audioIcon = document.createElement("span");
    audioIcon.textContent = "🔈︎";
    audioIcon.className = "audio-icon";
    audioIcon.onclick = () => new Audio(question.audio).play();
    questionText.appendChild(audioIcon);
  }

  // Split sentence and make each EXACT chunk clickable
  const parts = question.sentence.split(" ");
  parts.forEach(part => {
    const span = document.createElement("span");
    span.textContent = part;
    span.className = "word";

    span.onclick = () => {
      if (question.definitions.hasOwnProperty(part)) {
        showPopup(question.definitions[part]);
      }
    };

    questionText.appendChild(span);
  });

  question.answers.forEach(answer => {
    const btn = document.createElement("div");
    btn.className = "choice";
    btn.textContent = answer;
    btn.onclick = () => {
      if (answer === question.correct) {
        currentQuestionIndex++;
        if (currentQuestionIndex < lesson.questions.length) {
          renderQuestion();
        } else {
          showPopup("Lesson completed!");
        }
      } else {
        showPopup("Incorrect! Restarting lesson.");
        currentQuestionIndex = 0;
        renderQuestion();
      }
    };
    choicesDiv.appendChild(btn);
  });
}
</script>

</body>
</html>
